services:
  # ── 回测平台 (后端 + 前端) ──
  backtest:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ../data:/app/data:ro         # 挂载 sina-real-time CSV 目录
    environment:
      - RUST_LOG=backtest_server=info
    command: >
      /app/backtest-server
        --csv-dir /app/data
        --static-dir /app/static
        --port 4000
    restart: unless-stopped

  # ── 实时数据采集 (可选) ──
  collector:
    build:
      context: ..                    # 指向 git 仓库根目录 (sina-real-time)
      dockerfile: Dockerfile.collector
    volumes:
      - ../data:/app/data            # 采集数据写入共享目录
    command: >
      /app/sina-realtime-collector
        --stocks /app/stocks_100.txt
        --output /app/data
    restart: unless-stopped
    profiles:
      - with-collector               # docker compose --profile with-collector up
