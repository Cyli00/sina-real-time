services:
  backend:
    build: .
    restart: unless-stopped
    expose:
      - "4000"
    volumes:
      - db-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  db-data:
  caddy-data:
  caddy-config:
